services:
  database:
    image: postgres:17.4-alpine3.21
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  migrations:
    image: ${DOCKER_IMAGE:-strichbeste/conintclass13:latest}
    command: sh -c "npm run migrate"
    depends_on:
      - database
    env_file:
      - .env
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  app-blue:
    image: ${DOCKER_IMAGE:-strichbeste/conintclass13:latest}
    expose:
      - "5000"
    depends_on:
      - database
      - migrations
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  app-green:
    image: ${DOCKER_IMAGE:-strichbeste/conintclass13:latest}
    expose:
      - "5000"
    depends_on:
      - database
      - migrations
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/blue.conf:/etc/nginx/conf.d/active.conf:ro
    depends_on:
      - app-blue
      - app-green
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
