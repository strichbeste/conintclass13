stages:
  - build
  - deploy
  - test
  - switch

variables:
  DOCKER_IMAGE: $DOCKER_HUB_USERNAME/conintclass13
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA

# ─── BUILD & PUSH TO DOCKER HUB ──────────────────────────────────────────────
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  only:
    - main
  before_script:
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    - docker build -t $DOCKER_IMAGE:$DOCKER_TAG -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
    - docker push $DOCKER_IMAGE:latest

# ─── DEPLOY TO EC2 ───────────────────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:3.19
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh ubuntu@$EC2_HOST "
        set -e
        cd ~/conintclass13
        git pull origin main
        echo 'DOCKER_IMAGE=$DOCKER_IMAGE:$DOCKER_TAG' > .env.deploy
        export DOCKER_IMAGE=$DOCKER_IMAGE:$DOCKER_TAG
        docker pull $DOCKER_IMAGE:$DOCKER_TAG
        # Pull new image into the inactive slot
        CURRENT=\$(docker compose ps --services --filter status=running | grep app)
        if echo \$CURRENT | grep -q blue; then
          docker compose up -d --no-deps --pull always app-green migrations
          echo 'green' > /tmp/new_slot
        else
          docker compose up -d --no-deps --pull always app-blue migrations
          echo 'blue' > /tmp/new_slot
        fi
      "

# ─── PERFORMANCE TEST ────────────────────────────────────────────────────────
performance_test:
  stage: test
  image:
    name: grafana/k6:0.55.0
    entrypoint: ['']
  only:
    - main
  script:
    - k6 run --env BASE_URL=http://$EC2_HOST k6/performance-test.js
  after_script:
    - echo "Performance test completed with exit code $?"

# ─── BLUE-GREEN SWITCH (only if performance test passed) ─────────────────────
switch_traffic:
  stage: switch
  image: alpine:3.19
  only:
    - main
  when: on_success
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh ubuntu@$EC2_HOST "
        set -e
        cd ~/conintclass13
        NEW_SLOT=\$(cat /tmp/new_slot)
        echo \"Switching traffic to: \$NEW_SLOT\"
        cp nginx/\${NEW_SLOT}.conf nginx/active.conf
        docker compose up -d --no-deps nginx
        docker compose exec --interactive --tty nginx nginx -s reload
        echo \"Traffic switched to \$NEW_SLOT ✅\"
      "

# ─── NOTIFY ON FAILURE ───────────────────────────────────────────────────────
notify_failure:
  stage: switch
  image: alpine:3.19
  only:
    - main
  when: on_failure
  script:
    - |
      echo "=== DEPLOYMENT FAILED ==="
      echo "Pipeline: $CI_PIPELINE_URL"
      echo "Commit: $CI_COMMIT_SHORT_SHA by $GITLAB_USER_NAME"
      echo "Branch: $CI_COMMIT_REF_NAME"
      echo "Performance test failed - traffic NOT switched. Current version remains active."
      # Optional: send Slack/email notification via webhook
      # curl -X POST -H 'Content-type: application/json' \
      #   --data "{\"text\": \"Deployment failed for commit $CI_COMMIT_SHORT_SHA\"}" \
      #   $SLACK_WEBHOOK_URL
