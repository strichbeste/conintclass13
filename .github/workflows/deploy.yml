name: Build, Deploy & Blue-Green Switch

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: benebren/conintclass13

jobs:
  # ─── BUILD & PUSH TO DOCKER HUB ──────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.DOCKER_IMAGE }}:latest

  # ─── DEPLOY TO EC2 via AWS SSM (no SSH key needed) ──────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu/conintclass13",
              "git pull origin main",
              "export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.docker_tag }}",
              "docker pull $DOCKER_IMAGE",
              "CURRENT=$(docker compose ps --services --filter status=running | grep app || echo \"\")",
              "if echo \"$CURRENT\" | grep -q blue; then docker compose up -d --no-deps --pull always app-green migrations && echo green > /tmp/new_slot; else docker compose up -d --no-deps --pull always app-blue migrations && echo blue > /tmp/new_slot; fi"
            ]' \
            --comment "Deploy ${{ needs.build.outputs.docker_tag }}" \
            --output text

  # ─── PERFORMANCE TEST WITH k6 ─────────────────────────────────────────────
  performance_test:
    name: k6 Performance Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/performance-test.js
          flags: --env BASE_URL=http://${{ secrets.EC2_HOST }}

  # ─── SWITCH TRAFFIC (only if k6 passed) ───────────────────────────────────
  switch_traffic:
    name: Blue-Green Switch
    runs-on: ubuntu-latest
    needs: performance_test
    if: success()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Switch nginx traffic via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "cd /home/ubuntu/conintclass13",
              "NEW_SLOT=$(cat /tmp/new_slot)",
              "cp nginx/${NEW_SLOT}.conf nginx/active.conf",
              "docker compose up -d --no-deps nginx",
              "docker compose exec nginx nginx -s reload",
              "echo Traffic switched to $NEW_SLOT"
            ]' \
            --output text

  # ─── NOTIFY ON FAILURE ────────────────────────────────────────────────────
  notify_failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy, performance_test, switch_traffic]
    if: failure()
    steps:
      - name: Print failure info
        run: |
          echo "=== DEPLOYMENT FAILED ==="
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
